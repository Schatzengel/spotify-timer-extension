<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h3>Spotify Timer</h3>
  
  <input type="number" id="minutes" placeholder="Minutes">
  <button id="startBtn">Start Timer</button>

  <div id="presets">
    <button class="preset-btn" data-time="15">15m</button>
    <button class="preset-btn" data-time="30">30m</button>
    <button class="preset-btn" data-time="60">60m</button>
  </div>

  <button id="cancelBtn">Cancel Timer</button>

  <div id="countdown-container">
    <span id="countdown-label">Status</span>
    <div id="countdown">No active timer.</div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
